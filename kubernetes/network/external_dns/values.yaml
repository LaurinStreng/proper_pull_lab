policy: sync
registry: noop
interval: 15s

sources:
  - service
  - ingress
  - crd

provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/muhlba91/external-dns-provider-adguard
      tag: v9.0.0@sha256:f3d5c31a82e4e21000d81e8e0ae33ba0923c3785b5f927c6180761b13f545d68
    env:
    - name: ADGUARD_URL
      value: http://192.168.178.147
    - name: ADGUARD_USER
      valueFrom:
        secretKeyRef:
          name: external-dns-adguard-home
          key: username
    - name: ADGUARD_PASSWORD
      valueFrom:
        secretKeyRef:
          name: external-dns-adguard-home
          key: password
